version: '3.9'

services:
  platform:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: logadmin
      POSTGRES_PASSWORD: logadmin
      POSTGRES_DB: logs_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"